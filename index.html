<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Aぇ! group info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aegroup-info-fansite-main/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 新着情報・今日の予定の枠デザイン */
        .update-item, .today-item { 
            padding: 12px 15px; 
            margin-bottom: 12px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            font-size: 0.95rem;
            border-left: 5px solid #ff69b4; /* 基本（デフォルト）をAぇ! groupのピンクに設定 */
        }
        
        /* 長いURLの代わりに表示する、タップできるピンクのボタン */
        .update-link-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background-color: #ff69b4; /* Aぇ! groupのピンク */
            color: #fff !important;
            text-decoration: none !important;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .update-link-btn:hover {
            opacity: 0.8;
        }
        
        /* メンバーごとの左側の線の色を設定 */
        .border-group { border-left-color: #ff69b4 !important; }
        .border-kojima { border-left-color: #800080 !important; }
        .border-masakado { border-left-color: #0000ff !important; }
        .border-suezawa { border-left-color: #ff0000 !important; }
        .border-sano { border-left-color: #008000 !important; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Aぇ! group Info</h1>
        <p>インフォメーションサイト(非公式)</p>
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <nav class="tabs" id="navTabs">
        <a href="index.html" class="active">🏠 Home</a>
        <a href="schedule.html">📅 Schedule</a>
        <a href="sns.html">📱 SNS</a>
        <a href="tickets.html">🎫 Tickets</a>
        <a href="members.html">👤 Members</a>
    </nav>

    <main style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
        <!-- 1. 🆕 更新情報 -->
        <section class="card" style="margin-bottom: 20px;">
            <h2>🆕 更新情報</h2>
            <div id="updateList">🔑 読み込み中...</div>
        </section>

        <!-- 2. 📅 本日のスケジュール -->
        <section class="card" style="margin-bottom: 20px;">
            <h2>📅 本日のスケジュール</h2>
            <div id="todayList">🔑 読み込み中...</div>
        </section>

        <!-- 3. 📢 サイト説明 -->
        <section class="card">
            <h2>📢 Welcome</h2>
            <p>スマートフォンでご覧の方は、右上の ≡ ボタンを押すと各メニュータブが表示されます。</p>
        </section>
    </main>

    <script>
        const CAL_API_URL = "https://script.google.com/macros/s/AKfycbzh2IgijNSLHz9nx4D9iXfwnC4F0EhboOY8NaDJubK0btcUq9oTi193NXz2Aome2Io5iA/exec";

        function toggleMenu() {
            document.getElementById("navTabs").classList.toggle("show");
        }

        // メンバーカラーの線を判定（個人名が入っていない場合はすべて「グループ予定＝ピンク」にする確実なロジック）
        function getBorderClass(text) {
            if (!text) return "border-group";
            if (text.includes("小島")) return "border-kojima";
            if (text.includes("正門")) return "border-masakado";
            if (text.includes("末澤")) return "border-suezawa";
            if (text.includes("佐野")) return "border-sano";
            return "border-group"; /* 個人名がなければ100%ピンク枠 */
        }

        // URLからボタンの文字を変える設定
        function getLinkButtonText(url) {
            if (url.includes("instagram.com/stories")) return "📸 インスタストーリーを見る";
            if (url.includes("instagram.com")) return "📸 Instagramの投稿を見る";
            if (url.includes("x.com") || url.includes("twitter.com")) return "🐦 X(旧Twitter)を見る";
            if (url.includes("youtube.com")) return "📺 YouTubeを見る";
            if (url.includes("familyclub.jp")) return "✍️ ブログを見る";
            return "🔗 リンクを開く";
        }

        async function loadHomeData() {
            try {
                const response = await fetch(CAL_API_URL);
                const data = await response.json();
                
                // 【更新情報】の処理
                const updateList = document.getElementById("updateList");
                updateList.innerHTML = "";

                const updates = data.filter(item => item["予定外の更新"] === true || String(item["予定外の更新"]).toLowerCase() === "true");

                if (updates.length === 0) {
                    updateList.innerHTML = "<p style='color:#777;'>最近の更新情報はありません</p>";
                } else {
                    updates.reverse().forEach(item => {
                        const rawTitle = item["タイトル"] || "";
                        const detailText = item["詳細"] || "";
                        
                        let displayTitle = rawTitle;
                        let targetUrl = "";

                        // タイトル自体が長いURLだった場合のボタン化対策
                        if (rawTitle.startsWith("http")) {
                            displayTitle = "SNS更新情報";
                            targetUrl = rawTitle;
                        }

                        let timeStr = "";
                        if (item["時間"] && String(item["時間"]).includes("T")) {
                            const td = new Date(item["時間"]);
                            timeStr = ` (${String(td.getHours()).padStart(2, "0")}:${String(td.getMinutes()).padStart(2, "0")} 更新)`;
                        }

                        const borderClass = getBorderClass(detailText + displayTitle);
                        const div = document.createElement("div");
                        div.className = `update-item ${borderClass}`;
                        
                        let htmlContent = `<span style="color:#e1306c; font-weight:bold;">🔥 新着情報${timeStr}</span><br>`;
                        htmlContent += `<strong>${displayTitle}</strong>`;
                        
                        if (detailText && detailText !== rawTitle) {
                            htmlContent += `<br><span style="font-size:0.85rem; color:#666;">${detailText}</span>`;
                        }

                        // URLが存在する場合は綺麗なボタンを出す
                        if (targetUrl) {
                            const btnText = getLinkButtonText(targetUrl);
                            htmlContent += `<br><a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="update-link-btn">${btnText}</a>`;
                        }

                        div.innerHTML = htmlContent;
                        updateList.appendChild(div);
                    });
                }

                // 【本日のスケジュール】の処理
                const todayList = document.getElementById("todayList");
                todayList.innerHTML = "";
                
                const now = new Date();
                const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
                
                const todayEvents = data.filter(item => {
                    if(!item["日付"] || item["予定外の更新"] === true || String(item["予定外の更新"]).toLowerCase() === "true") return false;
                    const d = new Date(item["日付"]);
                    const itemDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                    return itemDate === todayStr;
                });

                if (todayEvents.length === 0) {
                    todayList.innerHTML = "<p style='color:#777;'>今日の予定はありません</p>";
                } else {
                    todayEvents.forEach(item => {
                        const rawTitle = item["タイトル"] || "";
                        const detailText = item["詳細"] || "";
                        const borderClass = getBorderClass(detailText + rawTitle);
                        
                        let timeStr = "";
                        if (item["時間"] && String(item["時間"]).includes("T")) {
                            const td = new Date(item["時間"]);
                            timeStr = `⏰ ${String(td.getHours()).padStart(2, "0")}:${String(td.getMinutes()).padStart(2, "0")} `;
                        }
                        
                        const div = document.createElement("div");
                        div.className = `today-item ${borderClass}`;
                        div.innerHTML = `<strong>${timeStr}${rawTitle}</strong><br><span style='font-size:0.85rem;color:#666;'>${detailText}</span>`;
                        todayList.appendChild(div);
                    });
                }

            } catch (e) {
                document.getElementById("todayList").innerText = "データの読み込みに失敗しました。";
                document.getElementById("updateList").innerText = "データの読み込みに失敗しました。";
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadHomeData);
    </script>
</body>
</html>
