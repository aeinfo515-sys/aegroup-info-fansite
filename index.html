<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aぇ! group Info</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Aぇ! group Info</h1>
<p>出演・チケット・SNSをまとめてチェック</p>

<input id="search" placeholder="検索（番組・メンバー）">
</header>

<nav class="tabs">
<button onclick="show('home')">Home</button>
<button onclick="show('schedule')">Schedule</button>
<button onclick="show('tickets')">Tickets</button>
<button onclick="show('members')">Members</button>
</nav>

<main>

<section id="home" class="panel active">
<div class="card"><h2>📺 今日の出演</h2><div id="today"></div></div>
<div class="card"><h2>🎫 チケット</h2><div id="ticket"></div></div>
<div class="card"><h2>📱 SNS</h2><a href="#">YouTube</a> / <a href="#">Instagram</a></div>
</section>

<section id="schedule" class="panel">
<div class="card"><h2>📅 出演一覧</h2><div id="list"></div></div>
</section>

<section id="tickets" class="panel">
<div class="card"><h2>🎫 チケット状況</h2>
<p class="ok">受付中</p>
<p class="ng">終了</p>
</div>
</section>

<section id="members" class="panel">
<div class="card">
<h2>👥 メンバー</h2>
<ul>
<li class="m">正門良規</li>
<li class="s">末澤誠也</li>
<li class="k">小島健</li>
<li class="a">佐野晶哉</li>
</ul>
</div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
