<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Aぇ! group info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aegroup-info-fansite-main/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .update-item { 
            padding: 12px 15px; 
            margin-bottom: 12px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            font-size: 0.95rem;
            border-left: 5px solid #ccc;
        }
        
        /* URLをボタンにするデザイン */
        .update-link-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background-color: #ff69b4;
            color: #fff !important;
            text-decoration: none !important;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .update-link-btn:hover {
            opacity: 0.8;
        }

        /* メンバーごとの左線の色 */
        .border-group { border-left-color: #ff69b4 !important; }
        .border-kojima { border-left-color: #800080 !important; }
        .border-masakado { border-left-color: #0000ff !important; }
        .border-suezawa { border-left-color: #ff0000 !important; }
        .border-sano { border-left-color: #008000 !important; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Aぇ! group Info</h1>
        <p>インフォメーションサイト(非公式)</p>
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <nav class="tabs" id="navTabs">
        <a href="index.html" class="active">🏠 Home</a>
        <a href="schedule.html">📅 Schedule</a>
        <a href="sns.html">📱 SNS</a>
        <a href="tickets.html">🎫 Tickets</a>
        <a href="members.html">👤 Members</a>
    </nav>

    <main style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
        <section class="card">
            <h2>🆕 更新情報</h2>
            <div id="updateList">🔑 読み込み中...</div>
        </section>
    </main>

    <script>
        const CAL_API_URL = "https://script.google.com/macros/s/AKfycbzh2IgijNSLHz9nx4D9iXfwnC4F0EhboOY8NaDJubK0btcUq9oTi193NXz2Aome2Io5iA/exec";

        function toggleMenu() {
            document.getElementById("navTabs").classList.toggle("show");
        }

        function getBorderClass(text) {
            if (!text) return "";
            if (text.includes("Aぇ! group")) return "border-group";
            if (text.includes("小島")) return "border-kojima";
            if (text.includes("正門")) return "border-masakado";
            if (text.includes("末澤")) return "border-suezawa";
            if (text.includes("佐野")) return "border-sano";
            return "";
        }

        async function loadUpdates() {
            try {
                const response = await fetch(CAL_API_URL);
                const data = await response.json();
                
                const updateList = document.getElementById("updateList");
                updateList.innerHTML = "";

                // スプレッドシートから届いたデータをそのまま安全に処理する
                if (!data || data.length === 0) {
                    updateList.innerHTML = "<p style='color:#777;'>最近の更新情報はありません</p>";
                    return;
                }

                // 「予定外の更新」の文字が入っている行、またはURLが直に入っている行を表示
                const updates = data.filter(item => {
                    if (!item) return false;
                    const isUnscheduled = item["予定外の更新"];
                    const hasUrlInTitle = String(item["タイトル"] || "").startsWith("http");
                    return isUnscheduled === true || String(isUnscheduled).toLowerCase() === "true" || hasUrlInTitle;
                });

                if (updates.length === 0) {
                    updateList.innerHTML = "<p style='color:#777;'>最近の更新情報はありません</p>";
                    return;
                }

                updates.reverse().forEach(item => {
                    const originalTitle = item["タイトル"] || "";
                    const detailText = item["詳細"] || "";
                    
                    let displayTitle = originalTitle;
                    let linkUrl = item["リンク"] || item["URL"] || "";

                    // タイトル自体がURL剥き出しだった場合の対策
                    if (originalTitle.startsWith("http")) {
                        displayTitle = "SNS更新情報";
                        if (!linkUrl) linkUrl = originalTitle;
                    }

                    let timeStr = "";
                    if (item["時間"] && String(item["時間"]).includes("T")) {
                        const td = new Date(item["時間"]);
                        timeStr = ` (${String(td.getHours()).padStart(2, "0")}:${String(td.getMinutes()).padStart(2, "0")} 更新)`;
                    }

                    const borderClass = getBorderClass(detailText + displayTitle);
                    const div = document.createElement("div");
                    div.className = `update-item ${borderClass}`;
                    
                    let htmlContent = `<span style="color:#e1306c; font-weight:bold;">🔥 新着情報${timeStr}</span><br>`;
                    htmlContent += `<strong>${displayTitle}</strong>`;
                    
                    if (detailText && detailText !== originalTitle) {
                        htmlContent += `<br><span style="font-size:0.85rem; color:#666;">${detailText}</span>`;
                    }

                    // リンクがある場合はボタンを表示
                    if (linkUrl && linkUrl.startsWith("http")) {
                        htmlContent += `<br><a href="${linkUrl}" target="_blank" rel="noopener noreferrer" class="update-link-btn"><i class="fa-solid fa-link"></i> リンクを開く</a>`;
                    }

                    div.innerHTML = htmlContent;
                    updateList.appendChild(div);
                });

            } catch (e) {
                document.getElementById("updateList").innerText = "データの読み込みに失敗しました。時間をおいて再度お試しください。";
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadUpdates);
    </script>
</body>
</html>
