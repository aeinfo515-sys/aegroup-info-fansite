<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Aぇ! group info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aegroup-info-fansite-main/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 新着情報の枠全体のデザイン */
        .update-item { 
            padding: 12px 15px; 
            margin-bottom: 12px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            font-size: 0.95rem;
        }
        
        /* 剥き出しの長いURLの代わりに表示する、タップできるピンクのボタン */
        .update-link-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background-color: #ff69b4; /* Aぇ! groupのピンク */
            color: #fff !important;
            text-decoration: none !important;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .update-link-btn:hover {
            opacity: 0.8;
        }
        
        /* メンバーごとの左側の線の色を設定 */
        .border-group { border-left: 5px solid #ff69b4; }
        .border-kojima { border-left: 5px solid #800080; }
        .border-masakado { border-left: 5px solid #0000ff; }
        .border-suezawa { border-left: 5px solid #ff0000; }
        .border-sano { border-left: 5px solid #008000; }
        .border-default { border-left: 5px solid #ccc; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Aぇ! group Info</h1>
        <p>インフォメーションサイト(非公式)</p>
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <nav class="tabs" id="navTabs">
        <a href="index.html" class="active">🏠 Home</a>
        <a href="schedule.html">📅 Schedule</a>
        <a href="sns.html">📱 SNS</a>
        <a href="tickets.html">🎫 Tickets</a>
        <a href="members.html">👤 Members</a>
    </nav>

    <main style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
        <section class="card">
            <h2>🆕 更新情報</h2>
            <div id="updateList">🔑 読み込み中...</div>
        </section>
    </main>

    <script>
        const CAL_API_URL = "https://script.google.com/macros/s/AKfycbzh2IgijNSLHz9nx4D9iXfwnC4F0EhboOY8NaDJubK0btcUq9oTi193NXz2Aome2Io5iA/exec";

        function toggleMenu() {
            document.getElementById("navTabs").classList.toggle("show");
        }

        // 左側のメンバーカラー線を判定
        function getBorderClass(text) {
            if (!text) return "border-default";
            if (text.includes("Aぇ! group")) return "border-group";
            if (text.includes("小島")) return "border-kojima";
            if (text.includes("正門")) return "border-masakado";
            if (text.includes("末澤")) return "border-suezawa";
            if (text.includes("佐野")) return "border-sano";
            return "border-default";
        }

        // URLからボタンの文字を親切に変える設定
        function getLinkButtonText(url) {
            if (url.includes("instagram.com/stories")) return "📸 インスタストーリーを見る";
            if (url.includes("instagram.com")) return "📸 Instagramの投稿を見る";
            if (url.includes("x.com") || url.includes("twitter.com")) return "🐦 X(旧Twitter)を見る";
            if (url.includes("youtube.com")) return "📺 YouTubeを見る";
            if (url.includes("familyclub.jp")) return "✍️ ブログを見る";
            return "🔗 リンクを開く";
        }

        async function loadUpdates() {
            try {
                const response = await fetch(CAL_API_URL);
                const data = await response.json();
                
                const updateList = document.getElementById("updateList");
                updateList.innerHTML = "";

                // 元々動いていたシンプルなフィルタリングだけに戻す
                const updates = data.filter(item => item["予定外の更新"] === true || String(item["予定外の更新"]).toLowerCase() === "true");

                if (updates.length === 0) {
                    updateList.innerHTML = "<p style='color:#777;'>最近の更新情報はありません</p>";
                    return;
                }

                updates.reverse().forEach(item => {
                    // 元のコードが使っていたプロパティ名（タイトル、詳細、時間など）をそのまま100%使用
                    const rawTitle = item["タイトル"] || "";
                    const detailText = item["詳細"] || "";
                    
                    let displayTitle = rawTitle;
                    let targetUrl = "";

                    // もし「タイトル」に直接長いURLが入っていたら、文字をスッキリさせてURLをボタン用に保存
                    if (rawTitle.startsWith("http")) {
                        displayTitle = "SNS更新情報";
                        targetUrl = rawTitle;
                    }

                    let timeStr = "";
                    if (item["時間"] && String(item["時間"]).includes("T")) {
                        const td = new Date(item["時間"]);
                        timeStr = ` (${String(td.getHours()).padStart(2, "0")}:${String(td.getMinutes()).padStart(2, "0")} 更新)`;
                    }

                    const borderClass = getBorderClass(detailText + displayTitle);
                    const div = document.createElement("div");
                    div.className = `update-item ${borderClass}`;
                    
                    // HTMLの組み立て
                    let htmlContent = `<span style="color:#e1306c; font-weight:bold;">🔥 新着情報${timeStr}</span><br>`;
                    htmlContent += `<strong>${displayTitle}</strong>`;
                    
                    if (detailText && detailText !== rawTitle) {
                        htmlContent += `<br><span style="font-size:0.85rem; color:#666;">${detailText}</span>`;
                    }

                    // 長いURLがあった場合はボタンとして下に表示する
                    if (targetUrl) {
                        const btnText = getLinkButtonText(targetUrl);
                        htmlContent += `<br><a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="update-link-btn">${btnText}</a>`;
                    }

                    div.innerHTML = htmlContent;
                    updateList.appendChild(div);
                });

            } catch (e) {
                document.getElementById("updateList").innerText = "データの読み込みに失敗しました。時間をおいて再度お試しください。";
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadUpdates);
    </script>
</body>
</html>
