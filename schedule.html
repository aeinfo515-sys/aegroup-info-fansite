<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スケジュール - Aぇ! group info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aegroup-info-fansite-main/style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js"></script>
    <style>
        .fc-event { border: none !important; padding: 2px 4px !important; font-size: 0.75rem !important; font-weight: bold !important; border-radius: 3px !important; cursor: pointer; }
        .cal-group { background-color: #ff69b4 !important; color: #fff !important; }
        .cal-kojima { background-color: #800080 !important; color: #fff !important; }
        .cal-masakado { background-color: #0000ff !important; color: #fff !important; }
        .cal-suezawa { background-color: #ff0000 !important; color: #fff !important; }
        .cal-sano { background-color: #008000 !important; color: #fff !important; }
        
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.4); 
            justify-content: center;
            align-items: center;
        }
        
        .modal-content { 
            background-color: #fff; 
            width: 90%;
            max-width: 350px; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
            position: relative;
            max-height: 70vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #aaa; }
        .modal-item { padding: 8px 10px; margin-bottom: 8px; border-left: 5px solid #ccc; background: #f9f9f9; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Aぇ! group Info</h1>
        <p>インフォメーションサイト(非公式)</p>
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <nav class="tabs" id="navTabs">
        <a href="index.html">🏠 Home</a>
        <a href="schedule.html" class="active">📅 Schedule</a>
        <a href="sns.html">📱 SNS</a>
        <a href="tickets.html">🎫 Tickets</a>
        <a href="members.html">👤 Members</a>
    </nav>

    <main class="calendar-container">
        <div id="calendar"></div>
    </main>

    <div id="dayModal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalDate" style="margin-top:0; border-bottom:2px solid #ff69b4; padding-bottom:5px; color:#ff69b4;"></h3>
            <div id="modalList"></div>
        </div>
    </div>

    <script>
        const CAL_API_URL = "https://script.google.com/macros/s/AKfycbzh2IgijNSLHz9nx4D9iXfwnC4F0EhboOY8NaDJubK0btcUq9oTi193NXz2Aome2Io5iA/exec";
        let rawEvents = [];

        function toggleMenu() {
            document.getElementById("navTabs").classList.toggle("show");
        }

        function getCalClass(text) {
            if (text.includes("Aぇ! group")) return "cal-group";
            if (text.includes("小島")) return "cal-kojima";
            if (text.includes("正門")) return "cal-masakado";
            if (text.includes("末澤")) return "cal-suezawa";
            if (text.includes("佐野")) return "cal-sano";
            return "";
        }

        function getBorderColor(text) {
            if (text.includes("Aぇ! group")) return "#ff69b4";
            if (text.includes("小島")) return "#800080";
            if (text.includes("正門")) return "#0000ff";
            if (text.includes("末澤")) return "#ff0000";
            if (text.includes("佐野")) return "#008000";
            return "#ccc";
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                displayEventTime: false,
                height: 'auto',
                dateClick: function(info) { showDayEvents(info.dateStr); },
                events: async function(info, successCallback, failureCallback) {
                    try {
                        // ⬇️ キャッシュを一切使わず、開くたびに必ず最新データを読み込むように修正
                        const response = await fetch(CAL_API_URL);
                        const data = await response.json();
                        
                        rawEvents = data.filter(item => !item["予定外の更新"]);

                        const events = rawEvents.map(item => {
                            if(!item["日付"] || String(item["日付"]).includes("1899")) return null;
                            const d = new Date(item["日付"]);
                            const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                            const matchText = (item["詳細"] || "") + (item["タイトル"] || "");
                            
                            return {
                                title: item["タイトル"],
                                start: dateStr,
                                className: getCalClass(matchText)
                            };
                        }).filter(e => e !== null);
                        
                        successCallback(events);
                    } catch (e) {
                        failureCallback(e);
                    }
                }
            });
            calendar.render();
        });

        function showDayEvents(dateStr) {
            const modal = document.getElementById("dayModal");
            const modalDate = document.getElementById("modalDate");
            const modalList = document.getElementById("modalList");
            
            const parts = dateStr.split("-");
            modalDate.innerText = `${parseInt(parts[1])}月${parseInt(parts[2])}日の予定`;
            modalList.innerHTML = "";

            let dayItems = rawEvents.filter(item => {
                if(!item["日付"]) return false;
                const d = new Date(item["日付"]);
                const itemDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                return itemDate === dateStr;
            });

            dayItems.sort((a, b) => {
                let timeA = "23:59";
                let timeB = "23:59";
                if (a["時間"] && String(a["時間"]).includes("T")) {
                    const tdA = new Date(a["時間"]);
                    timeA = String(tdA.getHours()).padStart(2, "0") + ":" + String(tdA.getMinutes()).padStart(2, "0");
                }
                if (b["時間"] && String(b["時間"]).includes("T")) {
                    const tdB = new Date(b["時間"]);
                    timeB = String(tdB.getHours()).padStart(2, "0") + ":" + String(tdB.getMinutes()).padStart(2, "0");
                }
                return timeA.localeCompare(timeB);
            });

            if (dayItems.length === 0) {
                modalList.innerHTML = "<p style='color:#777;'>予定はありません</p>";
            } else {
                dayItems.forEach(item => {
                    let timeStr = "";
                    if (item["時間"] && String(item["時間"]).includes("T")) {
                        const td = new Date(item["時間"]);
                        const h = String(td.getHours()).padStart(2, "0");
                        const m = String(td.getMinutes()).padStart(2, "0");
                        if (!(h === "00" && m === "00")) timeStr = `⏰ ${h}:${m} `;
                    }
                    const matchText = (item["詳細"] || "") + (item["タイトル"] || "");
                    const borderCol = getBorderColor(matchText);

                    const div = document.createElement("div");
                    div.className = "modal-item";
                    div.style.borderLeftColor = borderCol;
                    div.innerHTML = `<strong>${timeStr}${item["タイトル"]}</strong><br><span style='font-size:0.8rem;color:#666;'>${item["詳細"] || ""}</span>`;
                    modalList.appendChild(div);
                });
            }
            modal.style.display = "flex";
            document.querySelector('.modal-content').scrollTop = 0;
        }
        function closeModal() { document.getElementById("dayModal").style.display = "none"; }
    </script>
</body>
</html>
