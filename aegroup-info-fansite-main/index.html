<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Aぇ! group info - ファンサイト</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aegroup-info-fansite-main/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-item { padding: 8px 10px; margin-bottom: 8px; border-left: 5px solid #ccc; background: #f9f9f9; border-radius: 4px; font-size: 0.9rem; }
        .timeline-link { text-decoration: none; color: inherit; display: block; }
        .timeline-link:hover .timeline-item { background: #ffebee !important; transition: background 0.2s ease; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Aぇ! group Info</h1>
        <p>インフォメーションサイト(非公式)</p>
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <nav class="tabs" id="navTabs">
        <a href="index.html" class="active">🏠 Home</a>
        <a href="schedule.html">📅 Schedule</a>
        <a href="sns.html">📱 SNS</a>
        <a href="tickets.html">🎫 Tickets</a>
        <a href="members.html">👤 Members</a>
    </nav>

    <main style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
        
        <section class="card">
            <h2>🆕 更新情報</h2>
            <div id="timelineList" class="timeline-container">
                <p style="color:#777; font-size:0.9rem;">今日の更新情報はありません</p>
            </div>
        </section>

        <section class="card">
            <h2>📢 今日の予定</h2>
            <div id="todayList">
                <p style="color:#777; font-size:0.9rem;">今日の予定はありません</p>
            </div>
        </section>

        <section class="card">
            <h2>💡 サイトについて</h2>
            <p style="line-height: 1.8; color: #555; margin: 0;">
                Aぇ! groupのスケジュールや各種SNS、チケット情報などをまとめている非公式ファンサイトです。<br>
                スマホでは右上の ☰ ボタンを押すと、右側からスマートにメニューが開きます。
            </p>
        </section>

    </main>

    <script>
        const CAL_API_URL = "https://script.google.com/macros/s/AKfycbzh2IgijNSLHz9nx4D9iXfwnC4F0EhboOY8NaDJubK0btcUq9oTi193NXz2Aome2Io5iA/exec";

        function toggleMenu() {
            document.getElementById("navTabs").classList.toggle("show");
        }

        function getBorderColor(text) {
            if (text.includes("Aぇ! group")) return "#ff69b4";
            if (text.includes("小島")) return "#800080";
            if (text.includes("正門")) return "#0000ff";
            if (text.includes("末澤")) return "#ff0000";
            if (text.includes("佐野")) return "#008000";
            return "#ff69b4";
        }

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch(CAL_API_URL);
                const data = await response.json();
                
                const timelineList = document.getElementById("timelineList");
                const todayList = document.getElementById("todayList");
                
                const now = new Date();
                const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
                
                let timelineHtml = "";
                let todayHtml = "";

                data.forEach(item => {
                    // 色判定（予定外の更新、タイトル、詳細のどれかに名前が入っていれば反応）
                    const matchText = (item["予定外の更新"] || "") + (item["タイトル"] || "") + (item["詳細"] || "");
                    const borderCol = getBorderColor(matchText);

                    // ⏰ 時間パース
                    let timeStr = "";
                    if (item["時間"] && String(item["時間"]).includes("T")) {
                        const td = new Date(item["時間"]);
                        const h = String(td.getHours()).padStart(2, "0");
                        const m = String(td.getMinutes()).padStart(2, "0");
                        if (!(h === "00" && m === "00")) timeStr = `⏰ ${h}:${m} `;
                    }

                    // 🌟 1. 更新情報の表示（「予定外の更新」に文字がある ＆ タイムスタンプが今日）
                    if (item["予定外的更新"] || item["予定外の更新"]) {
                        const val = item["予定外の更新"] || item["予定外的更新"];
                        if (val && item["タイムスタンプ"]) {
                            const ts = new Date(item["タイムスタンプ"]);
                            const tsStr = ts.getFullYear() + '-' + String(ts.getMonth()+1).padStart(2,'0') + '-' + String(ts.getDate()).padStart(2,'0');
                            
                            if (tsStr === todayStr) {
                                const displayTime = String(ts.getHours()).padStart(2,'0') + ":" + String(ts.getMinutes()).padStart(2,'0');
                                
                                let linkStart = "";
                                let linkEnd = "";
                                if (item["リンク"]) {
                                    linkStart = `<a href="${item["リンク"]}" target="_blank" class="timeline-link">`;
                                    linkEnd = `</a>`;
                                }

                                timelineHtml += `
                                    ${linkStart}
                                    <div class="timeline-item" style="border-left-color: ${borderCol};">
                                        <span class="update-time" style="color: ${borderCol};">🔥 新着情報 (${displayTime} 更新)</span>
                                        <strong style="color: #333;">${val}</strong><br>
                                        <span style="font-size:0.8rem; color:#666;">${item["詳細"] || item["タイトル"] || ""}</span>
                                    </div>
                                    ${linkEnd}`;
                            }
                        }
                    }

                    // 🌟 2. 今日の予定の表示（日付が今日 ＆ 予定外の更新が空っぽ）
                    const hasUpdateField = item["予定外の更新"] || item["予定外的更新"];
                    if (!hasUpdateField && item["日付"]) {
                        const ed = new Date(item["日付"]);
                        const eDateStr = ed.getFullYear() + '-' + String(ed.getMonth()+1).padStart(2,'0') + '-' + String(ed.getDate()).padStart(2,'0');
                        
                        if (eDateStr === todayStr) {
                            todayHtml += `
                                <div class="modal-item" style="border-left: 5px solid ${borderCol};">
                                    <strong>${timeStr}${item["タイトル"] || ""}</strong><br>
                                    <span style="font-size:0.8rem; color:#666;">${item["詳細"] || ""}</span>
                                </div>`;
                        }
                    }
                });

                if(timelineHtml) timelineList.innerHTML = timelineHtml;
                if(todayHtml) todayList.innerHTML = todayHtml;

            } catch (e) {
                console.error("データ読み込みエラー:", e);
            }
        });
    </script>
</body>
</html>
