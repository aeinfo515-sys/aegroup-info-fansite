<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Members</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>
<header class="header"><h1>メンバー</h1></header>

<main class="container">

<div class="card accent-blue">
<h3>正門良規</h3>
<p>ギターを担当し、安定感のあるパフォーマンスと落ち着いた存在感が魅力。</p>
</div>

<div class="card accent-red">
<h3>末澤誠也</h3>
<p>圧倒的な歌唱力と表現力を持ち、グループのボーカル面を支える存在。</p>
</div>

<div class="card accent-purple">
<h3>小島健</h3>
<p>バラエティでも活躍し、独特の感性とトーク力でグループに個性を加える。</p>
</div>

<div class="card accent-green">
<h3>佐野晶哉</h3>
<p>音楽的センスに優れ、作曲や演奏面でも才能を発揮するマルチプレイヤー。</p>
</div>

</main>
</body>
</html>
